<form id="payment-form">
  <label>
    Payment Code
    <input name="code" type="text" class="mppx-input" placeholder="Enter code" required />
  </label>
  <label>
    Server Token
    <input
      name="serverToken"
      type="text"
      class="mppx-input"
      placeholder="Enter server token"
      required
    />
  </label>
  <button type="submit" class="mppx-button">Submit Payment</button>
</form>
