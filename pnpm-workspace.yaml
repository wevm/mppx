packages:
  - .
  - examples/*
  - examples/session/*
  - src/*/server/internal/html

strictDepBuilds: true
blockExoticSubdeps: true
minimumReleaseAge: 1440
trustPolicy: no-downgrade

overrides:
  mppx: 'workspace:*'
  vitest: 'npm:@voidzero-dev/vite-plus-test@~0.1.17'
  typescript: '~5.9.3'
  ox: '0.14.18'
  viem: '^2.47.5'
  path-to-regexp@<8.4.0: '8.4.0'
  tar@<=7.5.10: '7.5.11'
  '@modelcontextprotocol/sdk@>=1.10.0 <=1.25.3': '1.26.0'
  qs@>=6.7.0 <=6.14.1: '6.14.2'
  ip-address@<=10.1.0: '10.1.1'
  minimatch@>=5.0.0 <5.1.8: '5.1.8'
  minimatch@>=9.0.0 <9.0.7: '9.0.7'
  rollup@>=4.0.0 <4.59.0: '4.59.0'
  ajv@>=7.0.0-alpha.0 <8.18.0: '8.18.0'
  elysia@<1.4.26: '1.4.26'
  file-type: '21.3.2'
  flatted@<=3.4.1: '>=3.4.2'
  follow-redirects@<=1.15.11: '1.16.0'
  fast-uri@<=3.1.0: '3.1.1'
  undici@>=7.0.0 <7.24.0: '7.24.0'
  socket.io-parser@>=4.0.0 <4.2.6: '>=4.2.6'
  yaml@<2.8.3: '>=2.8.3'
  brace-expansion@<5.0.5: '>=5.0.5'
  lodash@<=4.17.23: '>=4.18.0'
  protobufjs@<7.5.5: '7.5.5'
  uuid@<14.0.0: '14.0.0'
  fast-uri@<=3.1.1: ^3.1.2

nodeOptions: '--disable-warning=ExperimentalWarning --disable-warning=DeprecationWarning'

allowBuilds:
  bufferutil: true
  bun: true
  cpu-features: true
  esbuild: true
  protobufjs: true
  ssh2: true
  utf-8-validate: true

minimumReleaseAgeExclude:
  - fast-uri@3.1.2
