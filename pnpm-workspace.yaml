packages:
  - .
  - examples/*
  - examples/session/*
  - src/*/server/internal/html

strictDepBuilds: true
blockExoticSubdeps: true
minimumReleaseAge: 1440
trustPolicy: no-downgrade

overrides:
  mppx: 'workspace:*'
  vitest: 'npm:@voidzero-dev/vite-plus-test@~0.1.24'
  typescript: '~5.9.3'
  ox: '0.14.24'
  viem: '^2.51.3'
  hono@<4.12.25: '4.12.25'
  path-to-regexp@<8.4.0: '8.4.0'
  tar@<=7.5.15: '7.5.16'
  '@modelcontextprotocol/sdk@>=1.10.0 <=1.25.3': '1.26.0'
  qs@>=6.7.0 <=6.15.1: '6.15.2'
  ip-address@<=10.1.0: '10.1.1'
  minimatch@>=5.0.0 <5.1.8: '5.1.8'
  minimatch@>=9.0.0 <9.0.7: '9.0.7'
  rollup@>=4.0.0 <4.59.0: '4.59.0'
  ajv@>=7.0.0-alpha.0 <8.18.0: '8.18.0'
  elysia@<1.4.26: '1.4.26'
  file-type: '21.3.2'
  flatted@<=3.4.1: '>=3.4.2'
  follow-redirects@<=1.15.11: '1.16.0'
  fast-uri@<=3.1.0: '3.1.1'
  undici@>=7.0.0 <7.24.0: '7.24.0'
  socket.io-parser@>=4.0.0 <4.2.6: '>=4.2.6'
  yaml@<2.8.3: '>=2.8.3'
  brace-expansion@>=5.0.0 <5.0.6: '5.0.6'
  ws@>=8.0.0 <8.21.0: '8.21.0'
  lodash@<=4.17.23: '>=4.18.0'
  protobufjs@<=7.6.2: '7.6.3'
  uuid@<14.0.0: '14.0.0'
  fast-uri@<=3.1.1: ^3.1.2
  tmp@<0.2.6: '0.2.6'
  vite@>=8.0.0 <=8.0.15: '8.0.16'
  vite-plus@<=0.1.23: '0.1.24'
  '@voidzero-dev/vite-plus-test@<=0.1.23': '0.1.24'
  esbuild@>=0.17.0 <0.28.1: '0.28.1'
  read-yaml-file@^1.1.0: '2.1.0'
  js-yaml@>=4.0.0 <=4.1.1: '4.2.0'

nodeOptions: '--disable-warning=ExperimentalWarning --disable-warning=DeprecationWarning'

allowBuilds:
  bufferutil: true
  bun: true
  cpu-features: true
  esbuild: true
  protobufjs: true
  ssh2: true
  utf-8-validate: true

minimumReleaseAgeExclude:
  - fast-uri@3.1.2
  - ox@0.14.24
  - tmp@0.2.6
  - viem@2.51.3
