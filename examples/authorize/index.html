<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tempo Authorize Playground</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        color: #171717;
        background: #f7f7f4;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        font-size: 16px;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      main {
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        font-weight: 650;
      }

      p {
        margin: 0;
        color: #5f625c;
      }

      .status {
        min-width: 260px;
        padding: 10px 12px;
        border: 1px solid #d7d8d0;
        border-radius: 6px;
        background: #ffffff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #3d4239;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) repeat(3, auto);
        align-items: end;
        gap: 12px;
        margin-bottom: 18px;
        padding: 14px;
        border: 1px solid #d7d8d0;
        border-radius: 8px;
        background: #ffffff;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: #5f625c;
      }

      input {
        width: 100%;
        min-height: 38px;
        padding: 7px 10px;
        border: 1px solid #c7c9bf;
        border-radius: 5px;
        background: #fff;
        color: #171717;
        font: inherit;
      }

      button {
        min-height: 38px;
        padding: 0 13px;
        border: 1px solid #171717;
        border-radius: 5px;
        background: #171717;
        color: #fff;
        font: inherit;
        cursor: pointer;
        white-space: nowrap;
      }

      button.secondary {
        border-color: #c7c9bf;
        background: #fff;
        color: #171717;
      }

      button.danger {
        border-color: #8f2d2d;
        background: #8f2d2d;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .metric {
        min-width: 120px;
        padding: 8px 10px;
        border: 1px solid #d7d8d0;
        border-radius: 6px;
        background: #fbfbf8;
      }

      .metric b {
        display: block;
        font-size: 12px;
        color: #5f625c;
        font-weight: 500;
      }

      .metric span {
        font-variant-numeric: tabular-nums;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid #d7d8d0;
        border-radius: 8px;
        background: #ffffff;
      }

      table {
        width: 100%;
        min-width: 1120px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #ecede7;
        text-align: left;
        vertical-align: middle;
      }

      th {
        background: #f1f2ec;
        color: #4b5046;
        font-size: 12px;
        font-weight: 600;
      }

      td {
        font-size: 14px;
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        background: #e8f1df;
        color: #2f5b25;
        font-size: 12px;
      }

      .pill.closed {
        background: #ececec;
        color: #555;
      }

      .pill.voided {
        background: #f6e4de;
        color: #8f2d2d;
      }

      .row-actions {
        display: grid;
        grid-template-columns: 92px auto auto auto;
        gap: 6px;
      }

      .empty {
        padding: 40px 12px;
        color: #777a72;
        text-align: center;
      }

      @media (max-width: 760px) {
        main {
          width: min(100vw - 20px, 1280px);
          padding-top: 18px;
        }

        header,
        .toolbar {
          display: grid;
          grid-template-columns: 1fr;
        }

        .status {
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Tempo Authorize Playground</h1>
          <p>Create authorizations, capture partial amounts, close, or void.</p>
        </div>
        <div class="status" id="status">Booting...</div>
      </header>

      <section class="toolbar" aria-label="Create authorization">
        <label>
          Units
          <input id="units" type="number" min="1" step="1" value="4" />
        </label>
        <div class="metric">
          <b>Unit price</b>
          <span id="unit-price">$0.25</span>
        </div>
        <div class="metric">
          <b>Authorize total</b>
          <span id="authorize-total">$1.00</span>
        </div>
        <button id="authorize" type="button">Authorize</button>
      </section>

      <section class="table-wrap" aria-label="Authorizations">
        <table>
          <thead>
            <tr>
              <th>Authorization</th>
              <th>Status</th>
              <th>Amount</th>
              <th>Captured</th>
              <th>Remaining</th>
              <th>Open tx</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="authorizations">
            <tr>
              <td class="empty" colspan="7">No authorizations yet.</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script type="module" src="/src/client.ts"></script>
  </body>
</html>
