<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stripe charge demo</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    h1 { margin-bottom: 0.5rem; }
    p { color: #666; margin-top: 0; }
    #payment-form { border: 1px solid #e5e7eb; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; background: #fff; display: grid; gap: 0.75rem; }
    #payment-form:empty, #payment-form.hidden { display: none; }
    #test-helpers { margin-bottom: 1rem; display: grid; gap: 0.5rem; }
    #test-helpers label { font-weight: 600; font-size: 0.9rem; }
    button { padding: 0.75rem; font-size: 1rem; background: #6b7280; color: #f8fafc; border: none; border-radius: 0; cursor: pointer; width: 100%; }
    button:hover { background: #4b5563; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    #button { background: #2563eb; }
    #button:hover { background: #1d4ed8; }
    #button:disabled { background: #93c5fd; }
    #submit-payment { background: #2563eb; }
    #submit-payment:hover { background: #1d4ed8; }
    .test-values { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; font-size: 0.9rem; color: #475569; }
    .copy-pill { width: auto; padding: 0.35rem 0.6rem; font-size: 0.85rem; background: #e5e7eb; color: #111827; border-radius: 0; border: 1px solid #cbd5e1; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .copy-pill:hover { background: #d1d5db; }
    #test-status { font-size: 0.85rem; color: #475569; }
    .hidden { display: none; }
    #form-error { border: 1px solid #fecaca; background: #fef2f2; color: #991b1b; padding: 0.75rem; border-radius: 6px; }
    #fortune { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px; padding: 1rem; margin-top: 1rem; font-size: 1.1rem; text-align: center; }
    #fortune:empty { display: none; }
    #output { background: #f5f5f5; padding: 1rem; border-radius: 4px; white-space: pre; overflow-x: auto; font-family: monospace; margin-top: 1rem; }
    #output:empty { display: none; }
  </style>
</head>
<body>
  <h1>Stripe charge demo</h1>
  <p>Pay per fortune via Stripe SPT.</p>

  <div id="payment-form" class="hidden"></div>
  <div id="test-helpers" class="hidden">
    <label>Test values (click to copy)</label>
    <div class="test-values">
      <button type="button" class="copy-pill" id="copy-card"></button>
      <button type="button" class="copy-pill" id="copy-exp"></button>
      <button type="button" class="copy-pill" id="copy-cvc"></button>
    </div>
    <div id="test-status"></div>
  </div>
  <button id="submit-payment" class="hidden">Confirm Payment</button>
  <div id="form-error" class="hidden"></div>

  <button id="button">Get Fortune ($1.00)</button>

  <div id="fortune"></div>
  <div id="output"></div>

  <script type="module" src="/src/client.ts"></script>
</body>
</html>
