<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stripe charge demo</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    h1 { margin-bottom: 0.5rem; }
    p { color: #666; margin-top: 0; }
    button { padding: 0.75rem; font-size: 1rem; background: #635bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
    button:hover { background: #524ddb; }
    button:disabled { background: #999; cursor: not-allowed; }
    #fortune { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px; padding: 1rem; margin-top: 1rem; font-size: 1.1rem; text-align: center; }
    #fortune:empty { display: none; }
    #output { background: #f5f5f5; padding: 1rem; border-radius: 4px; white-space: pre; overflow-x: auto; font-family: monospace; margin-top: 1rem; }
    #output:empty { display: none; }
  </style>
</head>
<body>
  <h1>Stripe charge demo</h1>
  <p>Pay per fortune via Stripe SPT.</p>

  <button id="button">Get Fortune ($1.00)</button>

  <div id="fortune"></div>
  <div id="output"></div>

  <script type="module" src="/src/client.ts"></script>
</body>
</html>
