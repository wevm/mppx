name: Pull request audit

permissions: {}

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to audit
        required: true
        type: number
      sha:
        description: Optional commit SHA override for the audit target
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'cyclops'
    steps:
      - name: Resolve manual target SHA
        if: github.event_name == 'workflow_dispatch'
        id: resolve_manual_target
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_SHA: ${{ inputs.sha }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          if [[ -n "$INPUT_SHA" ]]; then
            echo "sha=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          else
            SHA=$(gh api "repos/${{ github.repository }}/pulls/$INPUT_PR_NUMBER" --jq '.head.sha')
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish event
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_SHA: ${{ github.event.pull_request.head.sha || steps.resolve_manual_target.outputs.sha }}
          REPOSITORY: ${{ github.repository }}
          EVENTS_KEY: ${{ secrets.EVENTS_KEY }}
          EVENTS_CERT: ${{ secrets.EVENTS_CERT }}
        run: |
          set -euo pipefail

          printf '%s' "$EVENTS_KEY" > "$RUNNER_TEMP/key"
          printf '%s' "$EVENTS_CERT" > "$RUNNER_TEMP/cert"

          payload="$(jq -n \
            --arg repository "$REPOSITORY" \
            --arg sha "$PR_SHA" \
            --argjson pr_number "$PR_NUMBER" \
            '{repository:$repository,event:"pr_audit",data:{pr_number:$pr_number,sha:$sha}}')"

          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST ${{ secrets.EVENTS_ARGS }} \
            -H "Content-Type: application/json" \
            --key "$RUNNER_TEMP/key" \
            --cert "$RUNNER_TEMP/cert" \
            --data-binary "$payload")
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Event publish failed with HTTP $HTTP_CODE"
            exit 1
          fi
