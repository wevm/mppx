name: Pull request audit

permissions: {}

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to audit
        required: true
        type: number
      sha:
        description: Optional commit SHA override for the audit target
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'cyclops'
    steps:
      - name: Resolve manual target SHA
        if: github.event_name == 'workflow_dispatch'
        id: resolve_manual_target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ -n '${{ inputs.sha }}' ]]; then
            echo 'sha=${{ inputs.sha }}' >> "$GITHUB_OUTPUT"
          else
            SHA=$(gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number }} --jq '.head.sha')
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish event
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_SHA: ${{ github.event.pull_request.head.sha || steps.resolve_manual_target.outputs.sha }}
        run: |
          set -euo pipefail

          echo "${{ secrets.EVENTS_KEY }}" > ${{ runner.temp }}/key
          echo "${{ secrets.EVENTS_CERT }}" > ${{ runner.temp }}/cert

          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST ${{ secrets.EVENTS_ARGS }} \
            -H "Content-Type: application/json" \
            --key ${{ runner.temp }}/key \
            --cert ${{ runner.temp }}/cert \
            -d '{
              "repository": "${{ github.repository }}",
              "event": "pr_audit",
              "data": {
                "pr_number": ${{ env.PR_NUMBER }},
                "sha": "${{ env.PR_SHA }}"
              }
            }')
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Event publish failed with HTTP $HTTP_CODE"
            exit 1
          fi
