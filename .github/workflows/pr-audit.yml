name: Pull request audit

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to audit
        required: true
        type: number
      sha:
        description: Commit SHA to audit (defaults to the selected ref SHA)
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'cyclops'
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
      PR_SHA: ${{ github.event.pull_request.head.sha || inputs.sha || github.sha }}
    steps:
      - name: Publish event
        run: |
          set -euo pipefail

          echo "${{ secrets.EVENTS_KEY }}" > ${{ runner.temp }}/key
          echo "${{ secrets.EVENTS_CERT }}" > ${{ runner.temp }}/cert

          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST ${{ secrets.EVENTS_ARGS }} \
            -H "Content-Type: application/json" \
            --key ${{ runner.temp }}/key \
            --cert ${{ runner.temp }}/cert \
            -d '{
              "repository": "${{ github.repository }}",
              "event": "pr_audit",
              "data": {
                "pr_number": ${{ env.PR_NUMBER }},
                "sha": "${{ env.PR_SHA }}"
              }
            }')
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Event publish failed with HTTP $HTTP_CODE"
            exit 1
          fi
