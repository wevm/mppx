name: Verify
on:
  workflow_call:
    secrets:
      VITE_STRIPE_SECRET_KEY:
        required: false
      VITE_STRIPE_PUBLIC_KEY:
        required: false
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-gate:
    name: CI Gate
    if: always()
    needs: [checks, test, test-html]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi

  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Ensure overrides live in pnpm-workspace.yaml
        run: |
          if node -e "const p = require('./package.json'); if (p.pnpm?.overrides) { console.error('pnpm.overrides found in package.json — move them to pnpm-workspace.yaml'); process.exit(1); }"; then
            echo "✓ No pnpm.overrides in package.json"
          fi

      - name: Audit dependencies
        # npm's legacy audit endpoint is returning 410 Gone. Keep the audit
        # check enabled, but don't fail CI on registry-level audit outages.
        run: pnpm audit --ignore-registry-errors

      - name: Lint & format
        run: pnpm check:ci

      - name: Check types
        run: pnpm dev && pnpm exec tsx scripts/build:html.ts && pnpm check:types && pnpm check:types:html && pnpm check:types:examples

  test:
    name: Test Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # GitHub-hosted runners are ephemeral, so we can skip the Ryuk sidecar
      # and avoid Docker Hub rate limits on testcontainers/ryuk pulls.
      TESTCONTAINERS_RYUK_DISABLED: true
      VITE_TEMPO_TAG: latest
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Docker
        uses: docker/setup-docker-action@1a6edb0ba9ac496f6850236981f15d8f9a82254d # v5.0.0

      - name: Install secret-tool (libsecret)
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libsecret-tools gnome-keyring dbus-x11
          version: 1.0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Resolve Tempo image digest
        id: tempo-digest
        run: |
          digest=$(docker buildx imagetools inspect ghcr.io/tempoxyz/tempo:${VITE_TEMPO_TAG} --raw | sha256sum | cut -d' ' -f1)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Cache Tempo Docker image
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: docker-cache
        with:
          path: /tmp/tempo-image.tar
          key: tempo-image-${{ steps.tempo-digest.outputs.digest }}

      - name: Load cached Tempo image
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/tempo-image.tar

      - name: Pull and cache Tempo image
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/tempoxyz/tempo:${VITE_TEMPO_TAG}
          docker save ghcr.io/tempoxyz/tempo:${VITE_TEMPO_TAG} -o /tmp/tempo-image.tar

      - name: Bundle HTML files
        run: pnpm build

      - name: Run tests
        run: |
          eval "$(dbus-launch --sh-syntax)"
          eval "$(printf '\n' | gnome-keyring-daemon --unlock)"
          eval "$(printf '\n' | gnome-keyring-daemon --start)"
          pnpm exec vp test --run --project node --project cli --bail=1
        env:
          CI: true

  test-html:
    name: Test HTML
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium

      - name: Bundle HTML files
        run: pnpm build

      - name: Run browser unit tests
        run: pnpm exec vp test --run --project browser --bail=1
        env:
          CI: true
          # These browser-only unit tests do not touch localnet, so skip the
          # global Tempo server startup/teardown path that can leave the step hanging.
          VITE_NODE_ENV: testnet

      - name: Run tests
        run: pnpm run test:html
        env:
          CI: true
          MPP_SECRET_KEY: test-secret-key
          VITE_STRIPE_SECRET_KEY: ${{ secrets.VITE_STRIPE_SECRET_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}

      - name: Upload Playwright artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
