name: Verify
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-gate:
    name: CI Gate
    if: always()
    needs: [checks, test, test-html]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi

  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Ensure overrides live in pnpm-workspace.yaml
        run: |
          if node -e "const p = require('./package.json'); if (p.pnpm?.overrides) { console.error('pnpm.overrides found in package.json — move them to pnpm-workspace.yaml'); process.exit(1); }"; then
            echo "✓ No pnpm.overrides in package.json"
          fi

      - name: Audit dependencies
        run: pnpm audit

      - name: Lint & format
        run: pnpm check:ci

      - name: Check types
        run: pnpm dev && pnpm exec tsx scripts/build:html.ts && pnpm check:types && pnpm check:types:html && pnpm check:types:examples

  test:
    name: Test Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # GitHub-hosted runners are ephemeral, so we can skip the Ryuk sidecar
      # and avoid Docker Hub rate limits on testcontainers/ryuk pulls.
      TESTCONTAINERS_RYUK_DISABLED: true
      VITE_TEMPO_TAG: sha-20aecec
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Docker
        uses: docker/setup-docker-action@e43656e248c0bd0647d3f5c195d116aacf6fcaf4 # v4.7.0

      - name: Install secret-tool (libsecret)
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libsecret-tools gnome-keyring dbus-x11
          version: 1.0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Cache Playwright browsers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium

      - name: Cache Tempo Docker image
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: docker-cache
        with:
          path: /tmp/tempo-image.tar
          key: tempo-image-${{ env.VITE_TEMPO_TAG }}

      - name: Load cached Tempo image
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/tempo-image.tar

      - name: Pull and cache Tempo image
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/tempoxyz/tempo:${VITE_TEMPO_TAG}
          docker save ghcr.io/tempoxyz/tempo:${VITE_TEMPO_TAG} -o /tmp/tempo-image.tar

      - name: Bundle HTML files
        run: pnpm build

      - name: Run tests
        run: |
          eval "$(dbus-launch --sh-syntax)"
          eval "$(printf '\n' | gnome-keyring-daemon --unlock)"
          eval "$(printf '\n' | gnome-keyring-daemon --start)"
          pnpm run test --bail=1
        env:
          CI: true

  test-html:
    name: Test HTML
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Cache Playwright browsers
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium

      - name: Bundle HTML files
        run: pnpm build

      - name: Run tests
        run: pnpm run test:html
        env:
          CI: true
          MPP_SECRET_KEY: test-secret-key
          VITE_STRIPE_SECRET_KEY: ${{ secrets.VITE_STRIPE_SECRET_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}

      - name: Upload Playwright artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
