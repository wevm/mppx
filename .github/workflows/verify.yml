name: Verify
on:
  workflow_call:
  workflow_dispatch:

jobs:
  ci-gate:
    name: CI Gate
    if: always()
    needs: [checks, test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi

  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Audit dependencies
        run: pnpm audit

      - name: Lint & format
        run: pnpm check:ci

      - name: Check browser/Node compat
        run: pnpm check:compat

      - name: Check types
        run: pnpm check:types && pnpm check:types:examples

  test:
    name: Test Runtime
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Docker
        uses: docker/setup-docker-action@e43656e248c0bd0647d3f5c195d116aacf6fcaf4 # v4.7.0

      - name: Install secret-tool (libsecret)
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libsecret-tools gnome-keyring dbus-x11
          version: 1.0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests
        run: |
          eval "$(dbus-launch --sh-syntax)"
          eval "$(printf '\n' | gnome-keyring-daemon --unlock)"
          eval "$(printf '\n' | gnome-keyring-daemon --start)"
          pnpm run test --bail=1
        env:
          CI: true
          VITE_TEMPO_TAG: latest
