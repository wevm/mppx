name: Stripe Integration
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-stripe-live:
    name: HTML Stripe Integration
    if: github.repository == 'wevm/mppx'
    runs-on: ubuntu-latest
    env:
      MPPX_MOCK_STRIPE: '0'
      VITE_TEMPO_TAG: sha-20aecec

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Docker
        uses: docker/setup-docker-action@e43656e248c0bd0647d3f5c195d116aacf6fcaf4 # v4.7.0

      - name: Install secret-tool (libsecret)
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libsecret-tools gnome-keyring dbus-x11
          version: 1.0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Pre-pull Tempo image
        run: docker pull ghcr.io/tempoxyz/tempo:${VITE_TEMPO_TAG}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run live Stripe HTML integration tests
        run: pnpm test:html:stripe:live
        env:
          MPPX_MOCK_STRIPE: '0'
          VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          VITE_STRIPE_SECRET_KEY: ${{ secrets.VITE_STRIPE_SECRET_KEY }}
          VITE_TEMPO_TAG: sha-20aecec
