name: Conformance

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - edited
      - labeled
      - unlabeled
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  conformance-policy:
    name: Conformance Policy
    permissions:
      contents: read
      pull-requests: read
    uses: tempoxyz/mpp-tools/.github/workflows/sdk-conformance-policy.yml@main
    with:
      protocol-paths: |
        src/**
        package.json
        pnpm-lock.yaml

  conformance:
    name: Conformance
    needs: conformance-policy
    permissions:
      contents: read
    uses: tempoxyz/mpp-tools/.github/workflows/sdk-conformance.yml@main
    with:
      adapter: typescript
      conformance-ref: ${{ needs.conformance-policy.outputs.conformance_ref }}
